<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esercizi — Foglio di lavoro</title>
  <meta name="theme-color" content="#F6F5F2" />
  <link rel="icon" type="image/svg+xml" href="/img/brand/logo.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/exercises-table.css" />
</head>
<body class="table-body">
  <header class="table-header">
    <a href="/" class="back-btn-lg" aria-label="Torna all'app">‹</a>
    <h1>Esercizi — foglio di lavoro</h1>
    <div class="table-header-right">
      <button id="tbl-add-btn" class="btn btn-primary">+ Nuovo</button>
      <button id="tbl-theme" class="icon-btn" aria-label="Tema">☾</button>
    </div>
  </header>

  <section class="table-filters">
    <input type="search" id="tbl-search" placeholder="Cerca per nome o descrizione…" />
    <select id="tbl-filter-zone" multiple size="3" title="Filtra per zone (selezione multipla)"></select>
    <select id="tbl-filter-side">
      <option value="">Tutti i lati</option>
      <option value="both">Entrambi</option>
      <option value="dx">Destro</option>
      <option value="sx">Sinistro</option>
      <option value="bilaterale">Bilaterale</option>
    </select>
    <select id="tbl-filter-posizione">
      <option value="">Tutte le posizioni</option>
      <option value="in piedi">In piedi</option>
      <option value="da seduto">Da seduto</option>
      <option value="a terra">A terra</option>
    </select>
    <button type="button" id="tbl-filter-reset" class="btn btn-secondary">↺ Reset filtri</button>
    <span id="tbl-count" class="tbl-count">—</span>
  </section>

  <main class="table-wrap">
    <table class="sheet">
      <thead>
        <tr>
          <th class="col-thumb">Foto</th>
          <th class="col-name">
            <button type="button" class="th-sort" data-sort="name">Nome <span class="th-sort-arrow"></span></button>
          </th>
          <th class="col-desc">Descrizione</th>
          <th class="col-notes">Commento durante l'esercizio</th>
          <th class="col-zones">Zone</th>
          <th class="col-side">Lato</th>
          <th class="col-posizione">Posizione</th>
          <th class="col-modalita">Modalità</th>
          <th class="col-dur">Durata</th>
          <th class="col-reps" title="Usato solo se modalità = a ripetizioni">Ripetizioni</th>
          <th class="col-loop" title="Se il media è un video, riproduci in loop">Loop</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
    <div id="tbl-empty" class="empty-state hidden" style="padding:48px">Nessun esercizio corrisponde ai filtri.</div>
  </main>

  <input type="file" id="tbl-file-input" accept="image/*,video/*" class="hidden" />

  <div id="tbl-lightbox" class="tbl-lightbox hidden">
    <div class="tbl-lightbox-inner" id="tbl-lightbox-inner"></div>
  </div>

  <script>
    // Applica il tema subito (prima del render) per evitare flash di light mode.
    (function(){
      const saved = localStorage.getItem('st-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = (saved === 'light' || saved === 'dark') ? saved : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'light';
      const next = cur === 'dark' ? 'light' : 'dark';
      localStorage.setItem('st-theme', next);
      document.documentElement.setAttribute('data-theme', next);
    }
  </script>
  <script src="/js/exercises-table.js"></script>
</body>
</html>
